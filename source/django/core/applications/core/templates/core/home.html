<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamBase</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    {% load static %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'core/styles/home.css' %}"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">TeamBase</div>
        <nav>
          <a href="#">How it Works</a>
          <a href="#">About</a>
          <a href="/app" class="btn">Open App</a>
        </nav>
      </header>

      <section class="hero">
        <div class="hero-text">
          <h2>Internal Team Management</h2>
          <h1>Organize your employees with structure</h1>
          <p>
            A simple system to manage roles, responsibilities, and internal team
            data with clarity and consistency.
          </p>

          <div class="hero-buttons">
            <a href="/app" class="btn">Launch App →</a>
            <a href="/about" class="btn-secondary">Learn more</a>
          </div>
        </div>

        <div>
          <img
            src="https://images.unsplash.com/photo-1556761175-4b46a572b786"
            alt="Team working"
          />
        </div>
      </section>
    </div>
  </body>
</html>
