<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} | Sign In</title>
    {% load static %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'core/styles/signin.css' %}"
    />
  </head>
  <body>
    <header>
      <a href="/" class="logo">AvantKeel</a>
      <nav>
        <a href="/signup/" style="text-decoration: none; color: #000"
          >Sign Up</a
        >
      </nav>
    </header>

    <main class="content-wrapper">
      {% if messages %}
      <ul style="color: red; list-style: none">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}

      <div class="signin-form">
        <h2>Sign In</h2>
        <p>Welcome back! Please enter your details.</p>

        <form method="POST" action="{% url 'signin' %}">
          {% csrf_token %}

          <div class="field">
            <label>Email</label>
            <input
              type="email"
              name="email"
              placeholder="email@company.com"
              required
            />
          </div>

          <div class="field">
            <label>Password</label>
            <input
              type="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="options">
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <p style="margin-top: 25px; text-align: center">
          Don't have an account?
          <a
            href="/signup/"
            style="color: #29a8e0; text-decoration: none; font-weight: bold"
          >
            Sign Up
          </a>
        </p>
      </div>
    </main>

    <footer class="footer-simple">
      <p>© 2026 AvantKeel</p>
      <div style="margin-top: 10px; font-size: 13px">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Ethics</a>
      </div>
    </footer>
  </body>
</html>
