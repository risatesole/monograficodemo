<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvantKeel | Employee Application</title>
    {% load static %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'core/styles/employeemanager.css' %}"
    />
  </head>
  <body>
    {% include "core/header.html" %}

    <main class="content-wrapper">
      <h2>Aplicación de Gestión de Empleados</h2>

      <!-- Form -->
      <form
        method="POST"
        action="#"
        class="app-form"
        id="employeeForm"
      >
        {% csrf_token %}

        <div class="field">
          <label>Primer Nombre</label>
          <input type="text" id="fname" name="fname" placeholder="Ingresar nombre" required />
        </div>

        <div class="field">
          <label>Apellido</label>
          <input type="text" id="lname" name="lname" placeholder="Ingresar Apellido" required />
        </div>

        <div class="field">
          <label>Role</label>
          <select id="role" name="role">
            <option value="Chief Executive Officer">Chief Executive Officer (CEO)</option>
            <option value="Chief Operating Officer">Chief Operating Officer (COO)</option>
            <option value="Chief Financial Officer">Chief Financial Officer (CFO)</option>
            <option value="Office Manager">Office Manager</option>
            <option value="Human Resources Manager">Human Resources Manager</option>
            <option value="Recruiter">Recruiter</option>
            <option value="Accountant">Accountant</option>
            <option value="Administrative Assistant">Administrative Assistant</option>
            <option value="Executive Assistant">Executive Assistant</option>
            <option value="Project Manager">Project Manager</option>
            <option value="Product Manager">Product Manager</option>
            <option value="Software Developer">Software Developer</option>
            <option value="IT Support Specialist">IT Support Specialist</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Marketing Manager">Marketing Manager</option>
            <option value="Sales Representative">Sales Representative</option>
            <option value="Customer Support Specialist">Customer Support Specialist</option>
            <option value="Operations Coordinator">Operations Coordinator</option>
            <option value="Legal Advisor">Legal Advisor</option>
            <option value="Receptionist">Receptionist</option>
          </select>
        </div>

        <div class="field">
          <label>Cuenta de correo</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="jhon@example.com"
            required
          />
        </div>

        <button type="submit" class="submit-btn">Anadir a la lista</button>
      </form>

      <!-- list employees -->
      <h2>Revisar lista</h2>
      <div class="table-container">
        <table id="employeeTable">
          <thead>
            <tr>
              <th>Primer nombre</th>
              <th>Apellido</th>
              <th>Role</th>
              <th>Correo</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    {% include "core/footer.html" %}
  </body>
</html>
