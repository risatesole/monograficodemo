<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvantKeel | Employee Application</title>
    {% load static %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'employeemanager/styles/employeemanager.css' %}"
    />
  </head>
  <body>
    {% include "core/header.html" %}

    <main class="content-wrapper">
      <h2>Employee Management Application</h2>

      <!-- Form -->
      <form
        method="POST"
        action="#"
        class="app-form"
        id="employeeForm"
      >
        {% csrf_token %}

        <div class="field">
          <label>First Name</label>
          <input type="text" id="fname" name="fname" placeholder="name" required />
        </div>

        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lname" name="lname" placeholder="lastname" required />
        </div>

        <div class="field">
          <label>Role</label>
          <select id="role" name="role">
            <option value="Chief Executive Officer">Chief Executive Officer (CEO)</option>
            <option value="Chief Operating Officer">Chief Operating Officer (COO)</option>
            <option value="Chief Financial Officer">Chief Financial Officer (CFO)</option>
            <option value="Office Manager">Office Manager</option>
            <option value="Human Resources Manager">Human Resources Manager</option>
            <option value="Recruiter">Recruiter</option>
            <option value="Accountant">Accountant</option>
            <option value="Administrative Assistant">Administrative Assistant</option>
            <option value="Executive Assistant">Executive Assistant</option>
            <option value="Project Manager">Project Manager</option>
            <option value="Product Manager">Product Manager</option>
            <option value="Software Developer">Software Developer</option>
            <option value="IT Support Specialist">IT Support Specialist</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Marketing Manager">Marketing Manager</option>
            <option value="Sales Representative">Sales Representative</option>
            <option value="Customer Support Specialist">Customer Support Specialist</option>
            <option value="Operations Coordinator">Operations Coordinator</option>
            <option value="Legal Advisor">Legal Advisor</option>
            <option value="Receptionist">Receptionist</option>
          </select>
        </div>

        <div class="field">
          <label>Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="h.ramirez@avantkeel.com"
            required
          />
        </div>

        <button type="submit" class="submit-btn">Add to View List</button>
      </form>

      <!-- list employees -->
      <h2>Review List</h2>
      <div class="table-container">
        <table id="employeeTable">
          <thead>
            <tr>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Role</th>
              <th>Email Address</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    {% include "core/footer.html" %}

    <script>
      const form = document.getElementById("employeeForm");
      const tableBody = document.querySelector("#employeeTable tbody");

      const API_URL = "{% url 'employee_api' %}"; // ✅ FIXED

      // 🔹 Load employees from backend
      window.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch(API_URL);
          const data = await res.json();

          tableBody.innerHTML = "";

          data.employees.forEach(emp => {
            const row = `
              <tr>
                <td>${emp.first_name}</td>
                <td>${emp.last_name}</td>
                <td>${emp.role}</td>
                <td>${emp.email}</td>
              </tr>
            `;
            tableBody.innerHTML += row;
          });
        } catch (err) {
          console.error("Failed to load employees:", err);
        }
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const fname = document.getElementById("fname").value;
        const lname = document.getElementById("lname").value;
        const role = document.getElementById("role").value;
        const email = document.getElementById("email").value;

        // 🔹 Send to backend
        await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
          },
          body: JSON.stringify({
            fname,
            lname,
            role,
            email
          })
        });

        // 🔹 Reload list
        const res = await fetch(API_URL);
        const data = await res.json();

        tableBody.innerHTML = "";

        data.employees.forEach(emp => {
          const row = `
            <tr>
              <td>${emp.first_name}</td>
              <td>${emp.last_name}</td>
              <td>${emp.role}</td>
              <td>${emp.email}</td>
            </tr>
          `;
          tableBody.innerHTML += row;
        });

        form.reset();
      });

      function getCSRFToken() {
        let cookieValue = null;
        const cookies = document.cookie.split(";");

        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.startsWith("csrftoken=")) {
            cookieValue = cookie.substring("csrftoken=".length);
          }
        }
        return cookieValue;
      }
    </script>
  </body>
</html>
