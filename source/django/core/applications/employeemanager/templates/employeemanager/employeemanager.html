<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamBase | Choose Team</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #ffffff;
        color: #1f2937;
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        border-right: 1px solid #f3f4f6;
        padding: 20px;
        position: relative;
      }

      .brand {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 20px;
      }

      .sidebar-title {
        font-size: 12px;
        font-weight: 600;
        color: #6b7280;
        margin-bottom: 12px;
      }

      .list-item {
        padding: 10px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 6px;
      }

      .list-item:hover {
        background: #fafafa;
      }

      .active {
        background: #f3f4f6;
        font-weight: 500;
      }

      .btn {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        background: #1f2937;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 13px;
        cursor: pointer;
      }

      .btn:hover {
        background: #111827;
      }

      /* MAIN */
      .main {
        flex: 1;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        border-bottom: 1px solid #f3f4f6;
      }

      .logo {
        font-size: 15px;
        font-weight: 600;
        color: #1f2937;
        text-decoration: none;
      }

      .content-wrapper {
        max-width: 900px;
        margin: auto;
        padding: 50px 20px;
      }

      h2 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
      }

      .team-list {
        border: 1px solid #f3f4f6;
        border-radius: 6px;
        overflow: hidden;
      }

      .team {
        padding: 14px 12px;
        border-top: 1px solid #f3f4f6;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .team:first-child {
        border-top: none;
      }

      .team:hover {
        background: #fafafa;
      }

      .team-meta {
        font-size: 12px;
        color: #6b7280;
      }

      /* USER CARD (same style as other page) */
      .user-card {
        position: absolute;
        bottom: 20px;
        width: 200px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid #f3f4f6;
        border-radius: 8px;
        background: #ffffff;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #1f2937;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
      }

      .user-name {
        font-size: 13px;
        font-weight: 600;
      }

      .user-role {
        font-size: 11px;
        color: #6b7280;
      }

      /* MODAL */
      /* MODAL OVERLAY */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
      }

      /* MODAL BOX */
      .modal-box {
        width: 320px;
        background: white;
        border: 1px solid #f3f4f6;
        border-radius: 8px;
        padding: 16px;
      }

      .modal-box h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      /* INPUTS */
      .modal-box input,
      .modal-box textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #e5e7eb;
        border-radius: 5px;
        font-size: 13px;
        font-family: inherit;
      }

      .modal-box textarea {
        resize: none;
        height: 70px;
      }

      /* BUTTON ROW */
      .modal-actions {
        display: flex;
        gap: 8px;
      }

      /* SECONDARY BUTTON */
      .btn.secondary {
        background: #f3f4f6;
        color: #1f2937;
      }

      /* USER MENU DROPDOWN */
      .user-menu {
        position: absolute;
        bottom: 80px;
        left: 20px;
        width: 180px;
        background: white;
        border: 1px solid #f3f4f6;
        border-radius: 8px;
        display: none;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }

      .menu-item {
        padding: 10px;
        font-size: 13px;
        cursor: pointer;
      }

      .menu-item:hover {
        background: #fafafa;
      }

      .menu-item.danger {
        color: #dc2626;
      }
    </style>
  </head>

  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">TeamBase</div>

      <div class="sidebar-title">NAVIGATION</div>

      <div class="list-item active">Teams</div>
      <div class="list-item">My Activity</div>
      <div class="list-item">Notifications</div>

      <div class="sidebar-title" style="margin-top: 15px">ACTIONS</div>

      <button class="btn" onclick="openModal()">Create Team</button>

      <!-- USER -->
      <div class="user-card" onclick="toggleUserMenu()">
        <div class="avatar">H</div>
        <div>
          <div class="user-name">Henry E. Ramirez</div>
          <div class="user-role">Team Member</div>
        </div>
      </div>

      <!-- USER MENU -->
      <div class="user-menu" id="userMenu">
        <div class="menu-item">Settings</div>
        <div class="menu-item danger" onclick="logoutUser()">Logout</div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header>
        <a href="/" class="logo">TeamBase</a>
      </header>

      <main class="content-wrapper">
        <h2>Choose a Team</h2>

        <div class="team-list">
          <div class="team">
            <div>
              Design Team
              <div class="team-meta">3 members</div>
            </div>
            <div class="team-meta">→</div>
          </div>

          <div class="team">
            <div>
              Engineering Team
              <div class="team-meta">5 members</div>
            </div>
            <div class="team-meta">→</div>
          </div>

          <div class="team">
            <div>
              Marketing Team
              <div class="team-meta">2 members</div>
            </div>
            <div class="team-meta">→</div>
          </div>

          <div class="team">
            <div>
              Operations Team
              <div class="team-meta">4 members</div>
            </div>
            <div class="team-meta">→</div>
          </div>
        </div>
      </main>
    </div>

    <!-- CREATE TEAM MODAL -->
    <div class="modal" id="teamModal">
      <div class="modal-box">
        <h3>Create Team</h3>

        <input type="text" placeholder="Team name" />
        <textarea placeholder="Description"></textarea>
        <input type="text" placeholder="Add members (comma separated)" />

        <div class="modal-actions">
          <button class="btn secondary" onclick="closeModal()">Cancel</button>
          <button class="btn">Create</button>
        </div>
      </div>
    </div>
    <script>
      function openModal() {
        document.getElementById("teamModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("teamModal").style.display = "none";
      }

      /* User menu */
      function toggleUserMenu() {
        const menu = document.getElementById("userMenu");
        menu.style.display = menu.style.display === "flex" ? "none" : "flex";
        menu.style.flexDirection = "column";
      }

      document.addEventListener("click", function (e) {
        const menu = document.getElementById("userMenu");
        const userCard = document.querySelector(".user-card");

        if (!menu.contains(e.target) && !userCard.contains(e.target)) {
          menu.style.display = "none";
        }
      });

      function logoutUser() {
        window.location.href = "/signout";
      }
    </script>
  </body>
</html>
