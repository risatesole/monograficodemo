# This workflow implements Continuous Integration (CI) for the Django project.
# It automatically runs every time code is pushed or a pull request is created.
# The pipeline installs dependencies, applies database migrations,
# and executes tests to ensure the application is working correctly.
# This helps catch errors early and prevents broken code from being merged.

name: Django Tests

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]  

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source/django/core

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment
        run: echo "DJANGO_ENVIRONMENT=development" >> $GITHUB_ENV

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test
